name: CI

on:
  push:
    branches:
      - main
      - -develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 'latest'
          enable-cache: true

      - name: Lint with Ruff
        run: |
          uv run ruff check .

      - name: Check formatting with Ruff
        run: |
          uv run ruff format --check .

      - name: Run tests
        run: |
          uv lock --check
          uv run pytest -m "not integration_test"


